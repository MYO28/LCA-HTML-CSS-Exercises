<!doctype html>
<html>
  <head>
    <title>Forms</title>
  </head>
  <body>
    <h2>User Registration</h2>
    <form action="https://formspree.io/f/xpwzpzrd" method="POST">
      <div>
        <label for="first_name">First name:</label>
        <input
          type="text"
          id="first_name"
          name="first_name"
          placeholder="Insert First Name"
          required
        />
      </div>

      <br />

      <div>
        <label for="last_name">Last name:</label>
        <input
          type="text"
          id="last_name"
          name="last_name"
          placeholder="Insert Surname"
          required
        />
      </div>

      <br />

      <div>
        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>

      <br />

      <div>
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Insert Email"
          required
        />
      </div>

      <br />

      <div>
        <label>Date of Birth:</label>
        <input
          type="number"
          name="dob_day"
          placeholder="DD"
          style="width: 40px"
          min="1"
          max="31"
        />
        /
        <input
          type="number"
          name="dob_month"
          placeholder="MM"
          style="width: 40px"
          min="1"
          max="12"
        />
        /
        <input
          type="number"
          name="dob_year"
          placeholder="YYYY"
          style="width: 60px"
          min="1900"
          max="2026"
        />

        <input type="hidden" name="date_of_birth" />
      </div>

      <br />

      <div>
        <input type="reset" />
      </div>

      <br />

      <div>
        <input type="submit" />
      </div>
    </form>

    <hr />

    <h2>Search Portal</h2>
    <form action="https://httpbin.org/get" method="GET">
      <label for="search_name">Search Name:</label>
      <input
        type="text"
        id="Search Name"
        name="search_name"
        placeholder="Type to search..."
      />
      <input type="submit" value="Search" />
    </form>
  </body>
</html>
